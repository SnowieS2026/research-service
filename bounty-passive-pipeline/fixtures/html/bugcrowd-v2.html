<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Okta Bug Bounty | Bugcrowd</title>
</head>
<body class="bc-wrapper">

  <!-- Engagement hero -->
  <div class="bc-hero">
    <h2 class="bc-my-0">Okta</h2>
    <p class="bc-hint bc-mr-2 cc-break-wrap">Okta's public vulnerability disclosure program on Bugcrowd.</p>
    <div class="bc-stats">
      <div class="bc-stat">
        <span class="bc-stat__fig">4 out of 4</span>
        <span class="bc-stat__label">Scope Rating</span>
      </div>
    </div>
  </div>

  <!-- Rewards section — INCREASED -->
  <div class="bc-rewards">
    <div class="bc-p-3 bc-reward-card">
      <span class="bc-label">P1</span>
      <span class="bc-amount">$10,000 – $100,000</span>
    </div>
    <div class="bc-p-3 bc-reward-card">
      <span class="bc-label">P2</span>
      <span class="bc-amount">$5,000 – $50,000</span>
    </div>
  </div>

  <!-- Targets / scope — REMOVED subdomain.okta.com, ADDED api.okta.com -->
  <div class="bc-targets">
    <h3>In Scope</h3>
    <div class="bc-p-3">
      <a href="https://okta.com" rel="nofollow">https://okta.com</a>
    </div>
    <div class="bc-p-3">
      <a href="https://www.okta.com" rel="nofollow">https://www.okta.com</a>
    </div>
    <div class="bc-p-3">
      <a href="https://api.okta.com" rel="nofollow">https://api.okta.com</a>
    </div>
  </div>

  <!-- Out of scope — changed -->
  <div class="bc-out-of-scope">
    <h3>Out of Scope</h3>
    <p>https://blog.okta.com</p>
  </div>

  <!-- Started date — changed -->
  <div class="bc-meta">
    Started at Feb 01, 2025
  </div>

</body>
</html>
